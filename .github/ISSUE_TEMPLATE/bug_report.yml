name: Bug Report
description: Report a bug or unexpected behaviour in ditto.
title: "bug: "
labels: ["type::bug", "status::needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill in the details below so we can
        reproduce and fix the issue as quickly as possible.

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: A clear and concise description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Provide a minimal reproducible example.
      placeholder: |
        ```python
        from ditto.example import ExampleClass
        obj = ExampleClass(...)
        ```
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: ditto version
      placeholder: "e.g. 0.1.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "e.g. 3.11.5"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, any other relevant details.
      placeholder: "e.g. macOS 14.0, Ubuntu 22.04"
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, screenshots, or log output.
    validations:
      required: false
