name: UV Environment

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, ready_for_review, converted_to_draft]

permissions:
  contents: read

jobs:
  uv-sync:
    name: uv sync (${{ matrix.extra }}, Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        extra: [dev, docs]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync environment (--extra ${{ matrix.extra }})
        run: uv sync --frozen --extra ${{ matrix.extra }}

      - name: Verify package is importable
        run: uv run python -c "import ditto; print(ditto.__version__)"
