name: Auto Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release-on-version-bump:
    name: Tag and release when version changes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect version change in pyproject.toml
        id: version
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import subprocess
          import tomllib

          before_sha = os.environ["BEFORE_SHA"]
          after_sha = os.environ["AFTER_SHA"]

          after_data = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          after_version = after_data["project"]["version"]

          before_blob = subprocess.run(
              ["git", "show", f"{before_sha}:pyproject.toml"],
              capture_output=True,
              text=True,
              check=False,
          )

          before_version = ""
          if before_blob.returncode == 0:
              before_data = tomllib.loads(before_blob.stdout)
              before_version = before_data["project"].get("version", "")

          if before_version:
              changed = str(before_version != after_version).lower()
          else:
              # No previous version found (e.g., first push, history rewrite, or pyproject.toml added later)
              # Treat this as "no change" to avoid creating a tag/release spuriously.
              changed = "false"
          tag = f"v{after_version}"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"changed={changed}\n")
              fh.write(f"version={after_version}\n")
              fh.write(f"tag={tag}\n")
          PY

      - name: Check if tag already exists
        id: tag_exists
        if: steps.version.outputs.changed == 'true'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        if: steps.version.outputs.changed == 'true' && steps.tag_exists.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = '${{ steps.version.outputs.tag }}';
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tag}`,
              sha: context.sha,
            });

      - name: Create GitHub release
        if: steps.version.outputs.changed == 'true' && steps.tag_exists.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: false
