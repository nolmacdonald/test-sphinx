name: Build

# Builds the source distribution (sdist) and binary wheel for every push to
# main and for every pull request so that packaging regressions are caught
# early.  The workflow does NOT publish to PyPI.
#
# ── How to publish to PyPI (when you are ready) ───────────────────────────────
#
# 1. Configure Trusted Publishing on PyPI
#    - Log in to https://pypi.org and open your project's settings.
#    - Under "Publishing", add a new "GitHub Actions" publisher:
#        Owner:       <your-github-username-or-org>
#        Repository:  <repo-name>
#        Workflow:    build.yml
#        Environment: pypi  (create this in repo Settings → Environments)
#    - This uses OIDC so no API token is needed.
#
# 2. Add a publish job to this workflow (example below):
#
#    publish:
#      name: Publish to PyPI
#      needs: build
#      runs-on: ubuntu-latest
#      if: startsWith(github.ref, 'refs/tags/v')
#      environment:
#        name: pypi
#        url: https://pypi.org/p/<your-package-name>
#      permissions:
#        id-token: write   # required for OIDC trusted publishing
#      steps:
#        - name: Download built distributions
#          uses: actions/download-artifact@v4
#          with:
#            name: dist
#            path: dist/
#        - name: Publish to PyPI
#          uses: pypa/gh-action-pypi-publish@release/v1
#
# 3. Create and push a version tag to trigger the release:
#      git tag v1.0.0
#      git push origin v1.0.0
#
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build sdist and wheel
        run: uv build

      - name: List built artifacts
        run: ls -lh dist/

      - name: Upload distributions as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
